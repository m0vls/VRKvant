<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR/AR Квантум — База знаний</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kvant: '#8b5cf6',
                    }
                }
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .heading-font { font-family: 'Unbounded', sans-serif; }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Markdown Styles */
        .prose h1 { font-family: 'Unbounded', sans-serif; font-size: 1.75rem; margin-bottom: 1.5rem; color: #8b5cf6; font-weight: 700; }
        .prose h2 { font-family: 'Unbounded', sans-serif; font-size: 1.25rem; margin-top: 2rem; margin-bottom: 1rem; font-weight: 700; }
        .prose p { margin-bottom: 1rem; line-height: 1.8; color: #475569; }
        .dark .prose p { color: #cbd5e1; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.4rem; font-size: 0.9em; }
        .dark .prose code { background: #1e293b; }

        /* Mobile Menu Animation */
        #mobile-menu { transition: transform 0.3s ease-in-out; }
        #mobile-menu.hidden-menu { transform: translateX(100%); }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

    <!-- Навигация -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-900">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <!-- Логотип -->
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
                <div class="bg-kvant p-2 rounded-xl text-white shadow-lg shadow-kvant/30"><i class="fas fa-vr-cardboard text-xl"></i></div>
                <span class="heading-font font-bold text-lg tracking-tighter uppercase">VR/AR <span class="text-kvant">Квантум</span></span>
            </div>

            <!-- Десктопное меню -->
            <div class="hidden md:flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500 dark:text-slate-400">
                <button onclick="showPage('home')" class="nav-item active" id="nav-home">Главная</button>
                <button onclick="showPage('tracks')" class="nav-item" id="nav-tracks">Треки</button>
                <button onclick="showPage('cheats')" class="nav-item" id="nav-cheats">Шпаргалки</button>
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-amber-400 transition-all"><i id="theme-icon" class="fas fa-moon"></i></button>
            </div>

            <!-- Мобильная кнопка меню (Бургер) -->
            <div class="flex md:hidden items-center space-x-4">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-amber-400"><i id="theme-icon-mobile" class="fas fa-moon"></i></button>
                <button onclick="toggleMobileMenu()" class="text-slate-600 dark:text-slate-300 text-2xl focus:outline-none">
                    <i id="menu-toggle-icon" class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Мобильное меню (Overlay) -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white dark:bg-slate-950 hidden-menu md:hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-12">
            <span class="heading-font font-bold text-lg uppercase">Меню</span>
            <button onclick="toggleMobileMenu()" class="text-3xl text-slate-500">&times;</button>
        </div>
        <nav class="flex flex-col space-y-8 text-2xl font-bold">
            <button onclick="showPage('home')" class="text-left py-2 border-b border-slate-100 dark:border-slate-800">Главная</button>
            <button onclick="showPage('tracks')" class="text-left py-2 border-b border-slate-100 dark:border-slate-800">Треки</button>
            <button onclick="showPage('cheats')" class="text-left py-2 border-b border-slate-100 dark:border-slate-800">Шпаргалки</button>
        </nav>
        <div class="mt-auto text-center text-slate-400 text-xs uppercase tracking-widest">
            VR/AR Квантум
        </div>
    </div>

    <main id="home" class="page-content pt-32 px-6 active">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="heading-font text-3xl md:text-6xl mb-8 leading-tight uppercase tracking-tighter">Центр Знаний <br><span class="text-kvant italic">VR Kvant</span></h1>
            <p class="text-base md:text-lg text-slate-500 dark:text-slate-400 max-w-2xl mx-auto mb-12">Все учебные материалы, инструкции по оборудованию и гайды по разработке в одном месте.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="loadArticle('articles/blender/intro.md')" class="p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-kvant cursor-pointer transition-all shadow-sm">
                    <i class="fas fa-cube text-3xl mb-6 text-orange-500"></i>
                    <h3 class="heading-font text-lg mb-2 text-slate-900 dark:text-white">Blender</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">3D Моделирование</p>
                </div>
                <div onclick="loadArticle('articles/unity/intro.md')" class="p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-kvant cursor-pointer transition-all shadow-sm">
                    <i class="fab fa-unity text-3xl mb-6 text-indigo-500"></i>
                    <h3 class="heading-font text-lg mb-2 text-slate-900 dark:text-white">Unity</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">VR Разработка</p>
                </div>
                <div onclick="loadArticle('articles/unreal/intro.md')" class="p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-kvant cursor-pointer transition-all shadow-sm">
                    <i class="fas fa-bolt text-3xl mb-6 text-slate-400"></i>
                    <h3 class="heading-font text-lg mb-2 text-slate-900 dark:text-white">Unreal</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Визуализация</p>
                </div>
            </div>
        </div>
    </main>

    <section id="tracks" class="page-content pt-32 px-6 hidden">
        <div class="max-w-6xl mx-auto">
            <h2 class="heading-font text-2xl md:text-3xl mb-12 uppercase tracking-tighter text-center">Учебные <span class="text-kvant">траектории</span></h2>
            <div id="tracks-container" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="cheats" class="page-content pt-32 px-6 hidden">
        <div class="max-w-4xl mx-auto">
            <h2 class="heading-font text-2xl md:text-3xl mb-12 uppercase tracking-tighter text-center">База <span class="text-kvant">шпаргалок</span></h2>
            <div id="cheats-container" class="space-y-4"></div>
        </div>
    </section>

    <section id="article-viewer" class="page-content pt-32 px-6 hidden">
        <div class="max-w-4xl mx-auto">
            <button onclick="goBack()" class="mb-8 group flex items-center text-kvant font-bold uppercase text-xs tracking-widest">
                <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition"></i> Назад
            </button>
            <article id="article-content" class="prose max-w-none bg-white dark:bg-slate-900 p-6 md:p-16 rounded-[2rem] md:rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden">
            </article>
        </div>
    </section>

    <footer class="mt-20 py-12 border-t border-slate-100 dark:border-slate-900 text-center text-slate-400 text-[10px] uppercase tracking-[0.2em]">
        <p>© 2024 VR/AR Квантум • База Знаний</p>
    </footer>

    <script>
        const CONFIG = { tracks: 'articles/tracks.json', cheats: 'articles/cheats.json' };
        let lastPage = 'home';

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden-menu');
        }

        function showPage(pageId) {
            // Закрываем мобильное меню при переходе
            document.getElementById('mobile-menu').classList.add('hidden-menu');

            if (pageId !== 'article-viewer') {
                lastPage = pageId;
            }

            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active', 'hidden'));
            document.querySelectorAll('.page-content').forEach(p => p.id !== pageId ? p.classList.add('hidden') : p.classList.add('active'));
            
            document.querySelectorAll('.nav-item').forEach(n => {
                const isCurrent = n.id === 'nav-' + pageId || (pageId === 'article-viewer' && n.id === 'nav-' + lastPage);
                n.classList.toggle('text-kvant', isCurrent);
            });

            if (pageId === 'tracks') loadTracks();
            if (pageId === 'cheats') loadCheats();
            window.scrollTo(0, 0);
        }

        function goBack() {
            showPage(lastPage);
        }

        async function loadTracks() {
            try {
                const res = await fetch(CONFIG.tracks);
                const data = await res.json();
                document.getElementById('tracks-container').innerHTML = data.tracks.map(t => `
                    <div class="bg-slate-50 dark:bg-slate-900 rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 border border-slate-100 dark:border-slate-800">
                        <div class="flex items-center space-x-4 mb-6 md:mb-8">
                            <div class="w-10 h-10 ${t.colorClass} rounded-xl flex items-center justify-center text-white"><i class="${t.icon}"></i></div>
                            <h3 class="heading-font text-lg">${t.name}</h3>
                        </div>
                        <div class="space-y-3">
                            ${t.lessons.map(l => `<div onclick="loadArticle('articles/${t.id}/${l.file}')" class="p-4 bg-white dark:bg-slate-800 rounded-2xl flex justify-between items-center cursor-pointer hover:ring-2 ring-kvant transition text-sm"><span class="font-bold">${l.title}</span><i class="fas fa-play text-[10px] text-kvant"></i></div>`).join('')}
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Ошибка загрузки треков", e); }
        }

        async function loadCheats() {
            try {
                const res = await fetch(CONFIG.cheats);
                const data = await res.json();
                document.getElementById('cheats-container').innerHTML = data.cheats.map(c => `
                    <div onclick="loadArticle('articles/cheats/${c.file}')" class="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center cursor-pointer hover:bg-kvant hover:text-white transition group text-left">
                        <span class="font-bold text-sm md:text-base">${c.title}</span>
                        <i class="fas fa-arrow-right opacity-0 group-hover:opacity-100 transition"></i>
                    </div>
                `).join('');
            } catch(e) { console.error("Ошибка загрузки шпаргалок", e); }
        }

        async function loadArticle(path) {
            showPage('article-viewer');
            const area = document.getElementById('article-content');
            area.innerHTML = '<div class="flex justify-center p-10"><i class="fas fa-circle-notch fa-spin text-3xl text-kvant"></i></div>';
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error();
                const text = await res.text();
                area.innerHTML = marked.parse(text);
            } catch(e) {
                area.innerHTML = '<div class="text-center py-10"><h2 class="heading-font text-xl">Статья не найдена</h2><p class="text-slate-500">Проверьте путь к файлу: ' + path + '</p></div>';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            const icons = [document.getElementById('theme-icon'), document.getElementById('theme-icon-mobile')];
            icons.forEach(icon => {
                if (icon) {
                    if (isDark) {
                        icon.classList.replace('fa-moon', 'fa-sun');
                    } else {
                        icon.classList.replace('fa-sun', 'fa-moon');
                    }
                }
            });
        }

        window.onload = () => {
            const isDark = document.documentElement.classList.contains('dark');
            updateThemeIcons(isDark);
        };
    </script>
</body>
</html>
