name: Build Manifests & CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**/*.md'
      - 'scripts/build.js'
      - 'js/**'
      - 'tests/**'
      - 'e2e/**'
      - 'package.json'
      - 'vitest.config.js'
      - 'playwright.config.js'
      - 'tailwind.config.js'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.github/workflows/build.yml'

jobs:
  build-and-unit:
    name: 🏗️ Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: 🛠️ Build Assets (CSS & Manifests)
        id: build
        run: |
          echo "### 📦 Этапы сборки" >> $GITHUB_STEP_SUMMARY
          echo "| Этап | Статус | Инфо |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :--- |" >> $GITHUB_STEP_SUMMARY
          
          # Сборка CSS
          if npm run build:css; then
            echo "| 🛠 Сборка CSS | ✅ | Минификация завершена |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🛠 Сборка CSS | ❌ | Ошибка tailwind.config.js |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Сборка Манифестов
          if node scripts/build.js; then
            echo "| 📦 Генерация манифестов | ✅ | Файлы .json обновлены |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 Генерация манифестов | ❌ | Ошибка scripts/build.js |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Create test results directory
        run: mkdir -p test-results

      - name: 🧪 Run Unit & Integration Tests
        run: npm run test
        continue-on-error: true

      - name: 📝 Vitest Detailed Summary
        if: always()
        run: |
          echo "### 🧪 Результаты Unit-тестов" >> $GITHUB_STEP_SUMMARY
          echo "| Тест | Статус | Время |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :--- |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f test-results/vitest-results.xml ]; then
            # Используем perl для надежного парсинга многострочного XML
            perl -0777 -ne 'while (/<testcase\s+name="([^"]+)"[^>]*?time="([^"]+)"[^>]*?>(.*?)(<\/testcase>|\/>)/gs) { 
              $n=$1; $t=$2; $c=$3; $s = ($c =~ /<failure/) ? "❌" : "✅"; 
              print "| $n | $s | ${t}s |\n"; 
            }' test-results/vitest-results.xml >> $GITHUB_STEP_SUMMARY
            
            # Итоговая строка
            TOTAL=$(grep -o 'tests="[^"]*"' test-results/vitest-results.xml | head -1 | cut -d'"' -f2)
            FAILURES=$(grep -o 'failures="[^"]*"' test-results/vitest-results.xml | head -1 | cut -d'"' -f2)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Всего тестов:** $TOTAL | **Упало:** $FAILURES" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚠️ Ошибка | Файл отчета не найден | - |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish Vitest Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Results (Detailed)
          path: test-results/vitest-results.xml
          reporter: java-junit

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: |
            css/style.css
            articles/*.json

  e2e-tests:
    name: 🎭 E2E Tests
    needs: build-and-unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-assets

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Install Playwright Dependencies
        run: npx playwright install-deps chromium

      - name: Start local server
        run: npx http-server . -p 3000 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: 🎭 Run E2E Tests
        run: npm run test:e2e
        continue-on-error: true

      - name: 📝 Playwright Detailed Summary
        if: always()
        run: |
          echo "### 🎭 Результаты E2E-тестов" >> $GITHUB_STEP_SUMMARY
          echo "| Тест | Статус | Время |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :--- |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f test-results/playwright-results.xml ]; then
            # Используем perl для надежного парсинга многострочного XML
            perl -0777 -ne 'while (/<testcase\s+name="([^"]+)"[^>]*?time="([^"]+)"[^>]*?>(.*?)(<\/testcase>|\/>)/gs) { 
              $n=$1; $t=$2; $c=$3; $s = ($c =~ /<failure/) ? "❌" : "✅"; 
              print "| $n | $s | ${t}s |\n"; 
            }' test-results/playwright-results.xml >> $GITHUB_STEP_SUMMARY
            
            # Итоговая строка
            TOTAL=$(grep -o 'tests="[^"]*"' test-results/playwright-results.xml | head -1 | cut -d'"' -f2)
            FAILURES=$(grep -o 'failures="[^"]*"' test-results/playwright-results.xml | head -1 | cut -d'"' -f2)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Всего E2E тестов:** $TOTAL | **Упало:** $FAILURES" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚠️ Ошибка | Файл отчета не найден | - |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish Playwright Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Results (Detailed)
          path: test-results/playwright-results.xml
          reporter: java-junit

      - name: Upload E2E HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    name: 🚀 Deploy & Sync
    needs: [build-and-unit, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-assets

      - name: 💾 Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: обновление манифестов и стилей [skip ci]"
          file_pattern: 'articles/*.json css/style.css'
          disable_globbing: true

      - name: 🎉 Final Summary
        run: |
          echo "### 🚀 Сборка завершена" >> $GITHUB_STEP_SUMMARY
          echo "Изменения зафиксированы. GitHub Pages автоматически обновит сайт в течение минуты." >> $GITHUB_STEP_SUMMARY
