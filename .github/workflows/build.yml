name: Build Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**/*.md'
      - 'scripts/build.js'
      - 'js/**'
      - 'tests/**'
      - 'e2e/**'
      - 'package.json'
      - 'vitest.config.js'
      - 'playwright.config.js'
      - 'tailwind.config.js'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Create test results directory
      run: mkdir -p test-results

    - name: Build CSS
      run: npm run build:css

    - name: Run build script (Generate Manifests)
      run: node scripts/build.js

    - name: Run Unit & Integration Tests
      run: npm run test
      continue-on-error: true

    - name: Publish Vitest Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Vitest Results
        path: test-results/vitest-results.xml
        reporter: java-junit

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Install Playwright Dependencies
      run: npx playwright install-deps chromium

    - name: Start local server
      run: npx http-server . -p 3000 &

    - name: Wait for server
      run: npx wait-on http://localhost:3000

    - name: Run E2E Tests
      run: npm run test:e2e
      continue-on-error: true

    - name: Publish Playwright Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Results
        path: test-results/playwright-results.xml
        reporter: java-junit

    - name: Upload E2E HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "auto: обновление манифестов и стилей [skip ci]"
        file_pattern: 'articles/*.json css/style.css'
        disable_globbing: true

    - name: Trigger GitHub Pages deploy
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/pages/builds
